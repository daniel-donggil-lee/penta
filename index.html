<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>초등글쓰기 브레인스토밍</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0f1117;
    color: #e1e4e8;
    min-height: 100vh;
  }
  header {
    background: linear-gradient(135deg, #1a1f2e 0%, #0f1117 100%);
    border-bottom: 1px solid #2d333b;
    padding: 24px 40px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  header h1 { font-size: 22px; font-weight: 600; color: #f0f3f6; }
  header h1 span { color: #58a6ff; }
  .header-right { display: flex; align-items: center; gap: 16px; }
  .header-meta { font-size: 13px; color: #8b949e; }
  .header-meta a { color: #58a6ff; text-decoration: none; }
  .btn {
    padding: 6px 16px;
    border-radius: 6px;
    border: 1px solid #30363d;
    background: #21262d;
    color: #c9d1d9;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn:hover { background: #30363d; border-color: #8b949e; }
  .btn-primary { background: #1f6feb; border-color: #1f6feb; color: #fff; }
  .btn-primary:hover { background: #388bfd; }
  .tab-sub {
    font-size: 11px; color: #6e7681; display: block; margin-top: 2px;
  }
  .tab.active .tab-sub { color: #8b949e; }
  .tabs {
    display: flex; gap: 0; background: #161b22;
    border-bottom: 1px solid #2d333b; padding: 0 40px;
  }
  .tab {
    padding: 12px 24px; cursor: pointer; font-size: 14px; font-weight: 500;
    color: #8b949e; border-bottom: 2px solid transparent; transition: all 0.2s;
  }
  .tab:hover { color: #e1e4e8; }
  .tab.active { color: #f0f3f6; border-bottom-color: #58a6ff; }
  .tab .count {
    background: #30363d; color: #8b949e; font-size: 11px;
    padding: 1px 7px; border-radius: 10px; margin-left: 6px;
  }
  .tab.active .count { background: #1f3a5f; color: #58a6ff; }
  main { padding: 32px 40px; }
  .panel { display: none; }
  .panel.active { display: block; }
  .panel-header {
    display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;
  }
  .panel-desc {
    background: #161b22; border: 1px solid #2d333b; border-radius: 8px;
    padding: 14px 20px; font-size: 14px; color: #8b949e; line-height: 1.5; flex: 1;
  }
  .panel-desc strong { color: #e1e4e8; }
  .card-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 12px;
    margin-top: 16px;
  }
  .card {
    background: #161b22; border: 1px solid #2d333b; border-radius: 8px;
    padding: 16px 20px; transition: border-color 0.2s; position: relative;
  }
  .card:hover { border-color: #444c56; }
  .card-title { font-size: 15px; font-weight: 600; color: #f0f3f6; margin-bottom: 6px; }
  .card-content { font-size: 13px; color: #8b949e; line-height: 1.6; }
  .card-meta { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
  .badge {
    font-size: 11px; padding: 2px 10px; border-radius: 12px; font-weight: 500;
  }
  .badge-person { background: #1f2d1f; color: #56d364; border: 1px solid #2ea04333; }
  .badge-status { background: #341a00; color: #d29922; border: 1px solid #d2992233; }
  .badge-wait { background: #1c1c3a; color: #8b8bdb; border: 1px solid #8b8bdb33; }
  .card-note {
    font-size: 12px; color: #6e7681; margin-top: 8px; padding-top: 8px;
    border-top: 1px solid #2d333b; line-height: 1.5;
  }
  .choices { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
  .choice {
    font-size: 12px; padding: 4px 12px; border-radius: 6px;
    background: #1c2333; border: 1px solid #30363d; color: #c9d1d9;
  }
  .card-actions {
    position: absolute; top: 12px; right: 12px; display: flex; gap: 4px; opacity: 0;
    transition: opacity 0.15s;
  }
  .card:hover .card-actions { opacity: 1; }
  .card-actions button {
    background: #30363d; border: none; color: #8b949e; width: 28px; height: 28px;
    border-radius: 6px; cursor: pointer; font-size: 13px; display: flex;
    align-items: center; justify-content: center;
  }
  .card-actions button:hover { background: #484f58; color: #e1e4e8; }
  .section-title {
    font-size: 13px; font-weight: 600; color: #8b949e; text-transform: uppercase;
    letter-spacing: 0.5px; margin: 28px 0 4px 0;
  }

  /* Modal */
  .modal-overlay {
    display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.6); z-index: 100; align-items: center; justify-content: center;
  }
  .modal-overlay.show { display: flex; }
  .modal {
    background: #161b22; border: 1px solid #30363d; border-radius: 12px;
    width: 520px; max-width: 90vw; max-height: 80vh; overflow-y: auto; padding: 24px;
  }
  .modal h2 { font-size: 18px; color: #f0f3f6; margin-bottom: 16px; }
  .form-group { margin-bottom: 14px; }
  .form-group label {
    display: block; font-size: 13px; color: #8b949e; margin-bottom: 4px; font-weight: 500;
  }
  .form-group input, .form-group textarea, .form-group select {
    width: 100%; background: #0d1117; border: 1px solid #30363d; border-radius: 6px;
    padding: 8px 12px; color: #e1e4e8; font-size: 14px; font-family: inherit;
  }
  .form-group textarea { resize: vertical; min-height: 60px; }
  .form-group input:focus, .form-group textarea:focus, .form-group select:focus {
    outline: none; border-color: #58a6ff;
  }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }
  .loading {
    text-align: center; padding: 60px; color: #8b949e; font-size: 14px;
  }
  .status-dot {
    display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px;
  }
  .status-wait { background: #d29922; }
  .status-done { background: #56d364; }
  .status-progress { background: #58a6ff; }
  .toast {
    position: fixed; bottom: 24px; right: 24px; background: #1f6feb; color: #fff;
    padding: 10px 20px; border-radius: 8px; font-size: 13px; z-index: 200;
    display: none; animation: fadeIn 0.2s;
  }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>

<header>

let allData = {};
let currentTab = '아이디어';
let editingRow = null;

async function loadData() {
  try {
    const res = await fetch(API);
    allData = await res.json();
  } catch (e) {
    allData = INLINE_DATA;
  }
  renderTabs();
  renderPanel();
}

function renderTabs() {
  const bar = document.getElementById('tabBar');
  const arrow = '<span style="color:#444c56;font-size:16px;display:flex;align-items:center;padding:0 4px">&rarr;</span>';
  bar.innerHTML = SHEET_ORDER.map((name, i) => {
    const config = SHEET_CONFIG[name];
    const rows = allData[name] || [];
    const dataRows = rows.filter((r, idx) => idx >= 2 && r.some(c => c));
    const active = name === currentTab ? 'active' : '';
    const tab = `<div class="tab ${active}" onclick="switchTab('${name}')">
      ${name}<span class="count">${dataRows.length}</span>
      <span class="tab-sub">${config.sub}</span>
    </div>`;
    return i < SHEET_ORDER.length - 1 ? tab + arrow : tab;
  }).join('');
}

function switchTab(name) {
  currentTab = name;
  renderTabs();
  renderPanel();
}

function renderPanel() {
  const config = SHEET_CONFIG[currentTab];
  const rows = allData[currentTab] || [];
  const dataRows = rows.slice(2).filter(r => r.some(c => c));

  let html = `
    <div class="panel active">
      <div class="panel-header">
        <div class="panel-desc">${config.desc}</div>
        <button class="btn btn-primary" style="margin-left:12px;white-space:nowrap" onclick="openAddModal()">+ 추가</button>
      </div>
      <div class="card-grid">
  `;

  dataRows.forEach((row, idx) => {
    const realIdx = idx + 2;
    const title = row[0] || '';
    const cols = config.columns;

    if (!title) return;

    // Section title detection
    if (title.startsWith('역할:') || title.startsWith('역할 :')) {
      html += `</div><div class="section-title">${title}</div><div class="card-grid">`;
      return;
    }

    let contentHtml = '';
    for (let i = 1; i < cols.length; i++) {
      const val = row[i] || '';
      if (!val) continue;
      if (cols[i] === '담당' || cols[i] === '출처') {
        contentHtml += `<div class="card-meta"><span class="badge badge-person">${val}</span></div>`;
      } else if (cols[i] === '상태') {
        const dotClass = val === '대기' ? 'status-wait' : val === '완료' ? 'status-done' : 'status-progress';
        contentHtml += `<div class="card-meta"><span class="badge badge-status">${val}</span></div>`;
      } else if (cols[i] === '선택지' && val) {
        const choices = val.split('/').map(c => `<span class="choice">${c.trim()}</span>`).join('');
        contentHtml += `<div class="choices">${choices}</div>`;
      } else if (cols[i] === '비고' && val) {
        contentHtml += `<div class="card-note">${val}</div>`;
      } else {
        contentHtml += `<div class="card-content">${val}</div>`;
      }
    }

    html += `
      <div class="card">
        <div class="card-actions">
          <button onclick="openEditModal(${realIdx})" title="수정">&#9998;</button>
          <button onclick="deleteRow(${realIdx})" title="삭제">&#10005;</button>
        </div>
        <div class="card-title">${title}</div>
        ${contentHtml}
      </div>
    `;
  });

  html += '</div></div>';
  document.getElementById('mainContent').innerHTML = html;
}

function openAddModal() {
  editingRow = null;
  const config = SHEET_CONFIG[currentTab];
  document.getElementById('modalTitle').textContent = `${currentTab} - 항목 추가`;
  let fields = '';
  config.columns.forEach((col, i) => {
    const type = (col === '비고' || col === '내용' || col === '결과 요약') ? 'textarea' : 'input';
    fields += `<div class="form-group">
      <label>${col}</label>
      <${type} id="field_${i}" ${type === 'textarea' ? '' : 'type="text"'}></${type}>
    </div>`;
  });
  document.getElementById('modalFields').innerHTML = fields;
  document.getElementById('modal').classList.add('show');
}

function openEditModal(rowIdx) {
  editingRow = rowIdx;
  const config = SHEET_CONFIG[currentTab];
  const rows = allData[currentTab] || [];
  const row = rows[rowIdx] || [];
  document.getElementById('modalTitle').textContent = `${currentTab} - 항목 수정`;
  let fields = '';
  config.columns.forEach((col, i) => {
    const val = row[i] || '';
    const type = (col === '비고' || col === '내용' || col === '결과 요약') ? 'textarea' : 'input';
    fields += `<div class="form-group">
      <label>${col}</label>
      <${type} id="field_${i}" ${type === 'textarea' ? '' : 'type="text"'} value="${type === 'input' ? val.replace(/"/g, '&quot;') : ''}">${type === 'textarea' ? val : ''}</${type}>
    </div>`;
  });
  document.getElementById('modalFields').innerHTML = fields;
  document.getElementById('modal').classList.add('show');
}

function closeModal() {
  document.getElementById('modal').classList.remove('show');
  editingRow = null;
}

async function saveItem() {
  const config = SHEET_CONFIG[currentTab];
  const values = config.columns.map((_, i) => document.getElementById(`field_${i}`).value);

  try {
    if (editingRow !== null) {
      const endCol = String.fromCharCode(64 + config.columns.length);
      const range = `A${editingRow + 1}:${endCol}${editingRow + 1}`;
      await fetch(API, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ sheet: currentTab, range, values }),
      });
    } else {
      await fetch(API, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ sheet: currentTab, values }),
      });
    }
    closeModal();
    showToast(editingRow !== null ? '수정 완료' : '추가 완료');
    await loadData();
  } catch (e) {
    showToast('저장 실패');
  }
}

async function deleteRow(rowIdx) {
  if (!confirm('이 항목을 삭제하시겠습니까?')) return;
  const config = SHEET_CONFIG[currentTab];
  const endCol = String.fromCharCode(64 + config.columns.length);
  const range = `A${rowIdx + 1}:${endCol}${rowIdx + 1}`;
  try {
    await fetch(API, {
      method: 'DELETE',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ sheet: currentTab, range }),
    });
    showToast('삭제 완료');
    await loadData();
  } catch (e) {
    showToast('삭제 실패');
  }
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.display = 'block';
  setTimeout(() => t.style.display = 'none', 2000);
}

document.getElementById('modal').addEventListener('click', (e) => {
  if (e.target === document.getElementById('modal')) closeModal();
});

loadData();
</script>
</body>
</html>
